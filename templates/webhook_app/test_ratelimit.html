{% extends "webhook_app/base.html" %}
{% block title %}Rate Limit Monitor{% endblock %}

{% block content %}

<h2>⚡ Rate Limit Monitor</h2>

Batch Size <input id="count" value="20"><br>
Rate 1 (/s) <input id="rate1" value="5"><br>
Rate 2 (/s) <input id="rate2" value="20"><br>
User <input id="user" value="rate_test"><br>

<br>
<button onclick="runTest()">Run Test</button>

<br><br>

<pre id="log" style="height:420px;overflow:auto;background:#111;color:#0f0;padding:10px"></pre>

<script>
  async function ensureWebhook(user){

  await fetch("/api/webhooks/",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "X-User-Id":user
    },
    body:JSON.stringify({
      url:"http://mock_receiver:9000/",
      event_types:["request.created"]
    })
  })

}

function log(msg){
  const el=document.getElementById("log")
  el.textContent+=msg+"\n"
  el.scrollTop=el.scrollHeight
}

function sleep(ms){
  return new Promise(r=>setTimeout(r,ms))
}

async function setRate(rate){

  await fetch("/api/internal/rate-limit/",{
    method:"PUT",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({deliveries_per_second:rate})
  })

}

async function publish(count,user){

  const promises=[]

  for(let i=0;i<count;i++){

    promises.push(
      fetch("/api/events/ingest/",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
          user_id:user,
          event_type:"request.created",
          payload:{i}
        })
      })
    )

  }

  await Promise.all(promises)

}


async function monitor(expected){

  while(true){

    const r=await fetch("/api/internal/queue-status/")
    const d=await r.json()

    const t=new Date().toLocaleTimeString()

    log(`${t} | queue=${d.queue} | delivered=${d.delivered} | workers=${d.busy_workers}/${d.max_workers}`)

    if(d.delivered>=expected && d.queue===0){
      log("✔ batch complete\n")
      return
    }

    await sleep(500)

  }

}

async function runTest(){

  document.getElementById("log").textContent=""

  const count=parseInt(document.getElementById("count").value)
  const rate1=parseInt(document.getElementById("rate1").value)
  const rate2=parseInt(document.getElementById("rate2").value)
  const user=document.getElementById("user").value

  log("Resetting old test data")

  await fetch("/api/internal/reset-test/",{method:"POST"})

  log("Batch1 start")

  log("Registering webhook")

  await ensureWebhook(user)

  log("Batch1 start")

  await setRate(rate1)

  log("Publishing "+count+" events")
  await publish(count,user)
  log("Events inserted")

  await monitor(count)

  log("waiting 5 seconds\n")

  await sleep(5000)

  log("Batch2 start")

  await setRate(rate2)

  log("Publishing "+count+" events")
  await publish(count,user)
  log("Events inserted")

  await monitor(count*2)

  log("TEST COMPLETE")

}

</script>

{% endblock %}
