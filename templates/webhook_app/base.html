<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Webhook Delivery System{% endblock %}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #22263a;
      --border: #2e3250;
      --accent: #6366f1;
      --accent-hover: #818cf8;
      --success: #22c55e;
      --danger: #ef4444;
      --warning: #f59e0b;
      --text: #e2e8f0;
      --text-muted: #94a3b8;
      --radius: 10px;
      --font: 'Inter', system-ui, sans-serif;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Nav ── */
    nav {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      display: flex;
      align-items: center;
      gap: 2rem;
      height: 56px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .nav-brand {
      font-size: 1rem;
      font-weight: 700;
      color: var(--accent);
      text-decoration: none;
      letter-spacing: -0.5px;
    }
    .nav-brand span { color: var(--text-muted); font-weight: 400; }
    nav a {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.875rem;
      transition: color 0.15s;
    }
    nav a:hover, nav a.active { color: var(--text); }
    .nav-spacer { flex: 1; }
    .user-badge {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 0.8rem;
      color: var(--text-muted);
    }
    .user-badge strong { color: var(--accent); }

    /* ── Layout ── */
    .container { max-width: 1200px; margin: 0 auto; padding: 2rem; flex: 1; }

    /* ── User bar ── */
    .user-bar {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem 1.25rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }
    .user-bar label { font-size: 0.875rem; color: var(--text-muted); white-space: nowrap; }
    .user-bar input {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      padding: 6px 10px;
      font-size: 0.875rem;
      width: 200px;
    }
    .user-bar input:focus { outline: 2px solid var(--accent); border-color: transparent; }
    .user-bar .btn-sm { padding: 6px 14px; font-size: 0.8rem; }

    /* ── Buttons ── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 18px;
      border-radius: 7px;
      border: none;
      cursor: pointer;
      font-size: 0.875rem;
      font-weight: 500;
      transition: all 0.15s;
      text-decoration: none;
    }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
    .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }
    .btn-danger { background: rgba(239,68,68,0.15); color: var(--danger); border: 1px solid rgba(239,68,68,0.3); }
    .btn-danger:hover { background: rgba(239,68,68,0.25); }
    .btn-success { background: rgba(34,197,94,0.15); color: var(--success); border: 1px solid rgba(34,197,94,0.3); }
    .btn-success:hover { background: rgba(34,197,94,0.25); }
    .btn-sm { padding: 5px 12px; font-size: 0.8rem; }

    /* ── Cards ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
      margin-bottom: 1rem;
    }
    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1rem;
      gap: 1rem;
    }
    .card-title { font-size: 1rem; font-weight: 600; }
    .card-actions { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }

    /* ── Badges ── */
    .badge {
      display: inline-flex;
      align-items: center;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 0.75rem;
      font-weight: 600;
    }
    .badge-active { background: rgba(34,197,94,0.15); color: var(--success); }
    .badge-disabled { background: rgba(148,163,184,0.15); color: var(--text-muted); }
    .badge-success { background: rgba(34,197,94,0.15); color: var(--success); }
    .badge-failed { background: rgba(239,68,68,0.15); color: var(--danger); }
    .badge-pending { background: rgba(245,158,11,0.15); color: var(--warning); }
    .badge-event {
      background: rgba(99,102,241,0.15);
      color: var(--accent-hover);
      font-family: monospace;
      font-size: 0.75rem;
      padding: 2px 8px;
      border-radius: 4px;
    }

    /* ── Table ── */
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 0.875rem; }
    th { text-align: left; padding: 10px 14px; color: var(--text-muted); font-weight: 500; font-size: 0.8rem; border-bottom: 1px solid var(--border); }
    td { padding: 12px 14px; border-bottom: 1px solid var(--border); vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: var(--surface2); }
    .mono { font-family: monospace; font-size: 0.8rem; color: var(--text-muted); }

    /* ── Forms ── */
    .form-group { margin-bottom: 1.25rem; }
    .form-label { display: block; margin-bottom: 6px; font-size: 0.875rem; font-weight: 500; color: var(--text-muted); }
    .form-input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 7px;
      color: var(--text);
      padding: 10px 14px;
      font-size: 0.875rem;
    }
    .form-input:focus { outline: 2px solid var(--accent); border-color: transparent; }
    .checkbox-group { display: flex; flex-wrap: wrap; gap: 10px; }
    .checkbox-label {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 7px;
      padding: 8px 14px;
      cursor: pointer;
      font-size: 0.875rem;
      transition: border-color 0.15s;
    }
    .checkbox-label:hover { border-color: var(--accent); }
    .checkbox-label input[type=checkbox]:checked + span { color: var(--accent-hover); }

    /* ── Page header ── */
    .page-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.5rem;
      gap: 1rem;
    }
    .page-title { font-size: 1.5rem; font-weight: 700; }
    .page-subtitle { font-size: 0.875rem; color: var(--text-muted); margin-top: 4px; }

    /* ── Empty state ── */
    .empty-state {
      text-align: center;
      padding: 3rem;
      color: var(--text-muted);
    }
    .empty-state .icon { font-size: 2.5rem; margin-bottom: 0.75rem; }

    /* ── Alert ── */
    .alert {
      padding: 0.875rem 1.25rem;
      border-radius: 8px;
      margin-bottom: 1rem;
      font-size: 0.875rem;
    }
    .alert-success { background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.3); color: var(--success); }
    .alert-error { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); color: var(--danger); }

    /* ── Filter bar ── */
    .filter-bar { display: flex; gap: 8px; margin-bottom: 1.25rem; flex-wrap: wrap; }
    .filter-btn {
      padding: 5px 14px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text-muted);
      font-size: 0.8rem;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.15s;
    }
    .filter-btn:hover, .filter-btn.active {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(99,102,241,0.08);
    }

    /* ── Stats ── */
    .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 1rem; margin-bottom: 1.5rem; }
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem;
    }
    .stat-value { font-size: 1.75rem; font-weight: 700; color: var(--accent); }
    .stat-label { font-size: 0.8rem; color: var(--text-muted); margin-top: 4px; }

    /* ── URL ── */
    .url-cell {
      max-width: 280px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-family: monospace;
      font-size: 0.8rem;
    }

    /* ── Misc ── */
    .event-chips { display: flex; gap: 4px; flex-wrap: wrap; }
    .text-muted { color: var(--text-muted); }
    .flex { display: flex; }
    .gap-2 { gap: 8px; }
    .items-center { align-items: center; }
  </style>
  {% block extra_head %}{% endblock %}
</head>
<body>

<nav>
  <a href="/" class="nav-brand">⚡ Webhook<span>Sys</span></a>
  <a href="/" {% if request.path == '/' %}class="active"{% endif %}>Webhooks</a>
  <a href="/events/" {% if request.path == '/events/' %}class="active"{% endif %}>Publish Event</a>
  <a href="/deliveries/" {% if request.path == '/deliveries/' %}class="active"{% endif %}>Deliveries</a>
  <div class="nav-spacer"></div>
  {% if user_id %}
  <div class="user-badge">User: <strong>{{ user_id }}</strong></div>
  {% endif %}
</nav>

<div class="container">
  {% if messages %}
    {% for message in messages %}
      <div class="alert alert-{{ message.tags }}">{{ message }}</div>
    {% endfor %}
  {% endif %}

  {% block content %}{% endblock %}
</div>

{% block extra_scripts %}{% endblock %}
</body>
</html>
