version: '3.9'

# Common environment shared by all app services
x-app-env: &app-env
  DJANGO_SETTINGS_MODULE: webhook.settings
  REDIS_URL:              redis://redis:6379/0
  DEFAULT_RATE_LIMIT:     "10"
  # ── gevent pool for non-blocking Postgres under gevent ──
  USE_GEVENT_POOL: "true"
  # ── Celery ──
  CELERY_CONCURRENCY: "1000"

x-app-base: &app-base
  build: .
  volumes:
    - .:/app
  depends_on:
    redis:
      condition: service_healthy

services:

  # ── Redis ─────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Django web (Gunicorn + gevent workers) ────────────────────────────────────
  # 4 gevent workers × 1000 greenlets = handles burst publishes without queueing.
  # gevent workers + USE_GEVENT_POOL=true → non-blocking Postgres connections.
  web:
    <<: *app-base
    environment:
      <<: *app-env
      SERVICE_TYPE: web
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/internal/rate-limit/')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Celery worker (gevent pool, 1000 concurrent greenlets) ────────────────────
  # Handles: execute_delivery (HTTP POST) in parallel
  # gevent: 1000 in-flight HTTP POSTs, all yielding while waiting on network
  worker:
    <<: *app-base
    environment:
      <<: *app-env
      SERVICE_TYPE: worker
    depends_on:
      redis:
        condition: service_healthy
      web:
        condition: service_healthy

  # ── Celery Beat ───────────────────────────────────────────────────────────────
  # Schedules: process_delivery_queue (1s), flush_ingest_queue (2s),
  #            flush_writeback_queue (2s)
  beat:
    <<: *app-base
    environment:
      <<: *app-env
      SERVICE_TYPE: beat
    depends_on:
      redis:
        condition: service_healthy
      web:
        condition: service_healthy

  # ── Mock Receiver ─────────────────────────────────────────────────────────────
  mock_receiver:
    build:
      context: ./mock_receiver
    ports:
      - "9000:9000"
    environment:
      - PORT=9000

volumes:
  pg_data: