version: '3.9'

x-app-env: &app-env
  DJANGO_SETTINGS_MODULE: webhook.settings
  REDIS_URL:              redis://redis:6379/0
  DEFAULT_RATE_LIMIT:     "10"

x-app-base: &app-base
  build: .
  volumes:
    - .:/app
  depends_on:
    redis:
      condition: service_healthy

services:

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  web:
    <<: *app-base
    environment:
      <<: *app-env
      SERVICE_TYPE: web
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/internal/rate-limit/')"]
      interval: 10s
      timeout: 5s
      retries: 5

  worker:
    <<: *app-base
    environment:
      <<: *app-env
      SERVICE_TYPE: worker
    depends_on:
      redis:
        condition: service_healthy
      web:
        condition: service_healthy

  beat:
    <<: *app-base
    environment:
      <<: *app-env
      SERVICE_TYPE: beat
    depends_on:
      redis:
        condition: service_healthy
      web:
        condition: service_healthy

  mock_receiver:
    build:
      context: ./mock_receiver
    ports:
      - "9000:9000"
    environment:
      - PORT=9000